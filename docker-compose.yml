services:
  backend:
    build: ./backend
    container_name: lumenia_backend
    environment:
      - DATABASE_URL=sqlite:///data/lumenia.db
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  frontend:
    build: ./frontend
    container_name: lumenia_frontend
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    ports: ["8502:8502"]
    command: streamlit run app.py --server.port 8502 --server.address 0.0.0.0
